<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransitOps — Smart Transport Operations Platform</title>
  <meta name="description" content="TransitOps: A smart transport operations platform for fleet management, driver safety, trip dispatch, maintenance tracking, and expense analytics." />

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Tailwind Config -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#f8f9fa",
            "on-background": "#191c1d",
            "surface": "#f8f9fa",
            "surface-dim": "#d9dadb",
            "surface-bright": "#f8f9fa",
            "on-surface": "#191c1d",
            "on-surface-variant": "#44474c",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f3f4f5",
            "surface-container": "#edeeef",
            "surface-container-high": "#e7e8e9",
            "surface-container-highest": "#e1e3e4",
            "outline": "#74777d",
            "outline-variant": "#c4c6cd",
            "primary": "#041627",
            "on-primary": "#ffffff",
            "primary-container": "#1a2b3c",
            "on-primary-container": "#8192a7",
            "primary-fixed": "#d2e4fb",
            "primary-fixed-dim": "#b7c8de",
            "on-primary-fixed": "#0b1d2d",
            "on-primary-fixed-variant": "#38485a",
            "inverse-primary": "#b7c8de",
            "secondary": "#865300",
            "on-secondary": "#ffffff",
            "secondary-container": "#fea520",
            "on-secondary-container": "#694000",
            "secondary-fixed": "#ffddb9",
            "secondary-fixed-dim": "#ffb961",
            "on-secondary-fixed": "#2b1700",
            "on-secondary-fixed-variant": "#663e00",
            "tertiary": "#001a08",
            "on-tertiary": "#ffffff",
            "tertiary-container": "#003115",
            "on-tertiary-container": "#18a659",
            "tertiary-fixed": "#7efba4",
            "tertiary-fixed-dim": "#61de8a",
            "on-tertiary-fixed": "#00210c",
            "on-tertiary-fixed-variant": "#005228",
            "error": "#ba1a1a",
            "on-error": "#ffffff",
            "error-container": "#ffdad6",
            "on-error-container": "#93000a",
            "inverse-surface": "#2e3132",
            "inverse-on-surface": "#f0f1f2",
            "surface-tint": "#4f6073"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            "stack-tight": "8px",
            "margin-page": "24px",
            "gutter-grid": "16px",
            "container-padding": "20px",
            "component-gap": "12px"
          },
          fontFamily: {
            "headline-sm": ["Inter"],
            "headline-md": ["Inter"],
            "label-sm": ["Inter"],
            "body-lg": ["Inter"],
            "body-md": ["Inter"],
            "data-tabular": ["Inter"],
            "display-lg": ["Inter"]
          },
          fontSize: {
            "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
            "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
            "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
            "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "data-tabular": ["13px", { lineHeight: "18px", fontWeight: "500" }],
            "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }]
          }
        }
      }
    }
  </script>

  <!-- Global Styles -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      min-height: max(884px, 100dvh);
      -webkit-font-smoothing: antialiased;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #a1a1a1; }
    /* Smooth transitions */
    * { transition-property: background-color, border-color, color, opacity; transition-duration: 150ms; transition-timing-function: ease; }
    ::selection { background: rgba(254, 165, 32, 0.25); }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
